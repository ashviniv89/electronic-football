<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electronic Football</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <p class="eyebrow">Electronic Football</p>
        <h1>World Cup Showdown</h1>
        <p class="intro">
          Pick one of 195 countries and face a random rival in a fast, simple
          soccer match.
        </p>
      </header>

      <section class="panel controls-panel">
        <label for="countrySelect">Choose your nation</label>
        <div class="control-row">
          <select id="countrySelect"></select>
          <button id="playButton">Start Match</button>
        </div>
        <p id="statusMessage" class="status">Select a country to begin.</p>
      </section>

      <section class="panel match-card">
        <div class="scoreboard">
          <div class="team-box">
            <h2 id="playerCountry">-</h2>
            <p class="score" id="playerScore">0</p>
          </div>
          <div class="versus">VS</div>
          <div class="team-box">
            <h2 id="opponentCountry">-</h2>
            <p class="score" id="opponentScore">0</p>
          </div>
        </div>
        <p id="matchSummary" class="summary">
          Your match result will appear here.
        </p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
